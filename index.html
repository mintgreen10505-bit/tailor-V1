<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>裁縫小助手 - 穩定版</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        :root {
            --sea-salt-bg: #faffff;
            --bubble-blue: #e0f7fa;
            --accent-blue: #38bdf8;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--sea-salt-bg);
            color: #000000;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .bubble-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px rgba(186, 230, 253, 0.2);
            border-radius: 2.5rem;
        }

        .nav-glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(224, 242, 254, 0.5);
        }

        .bubble-shadow {
            box-shadow: 0 10px 30px rgba(224, 242, 254, 0.6);
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .page-transition {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, signInWithCustomToken, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 確保 FB 物件在 React 執行前就緒
        window.FB = { initializeApp, getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query, signInWithCustomToken, signInAnonymously };
        // 觸發自定義事件通知 React Firebase 已就緒
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // 🌟 強化版 Icon 組件 🌟
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons({
                        root: iconRef.current
                    });
                }
            }, [name, size]);

            return (
                <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`}>
                    <i data-lucide={name} style={{ width: size, height: size }}></i>
                </span>
            );
        };

        const COMPONENT_TYPES = [
            { id: 'both', label: '全縮放' },
            { id: 'width', label: '僅寬度' },
            { id: 'height', label: '僅高度' },
            { id: 'fixed', label: '固定' },
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [fbReady, setFbReady] = useState(!!window.FB);
            const [authLoading, setAuthLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('list');
            const [templates, setTemplates] = useState([]);
            const [currentTemplate, setCurrentTemplate] = useState(null);
            const [scaleInput, setScaleInput] = useState({ addW: 0, addH: 0 });
            const [copyFeedback, setCopyFeedback] = useState(null);

            const firebaseConfig = JSON.parse(window.__firebase_config || "{}");
            const appId = window.__app_id || 'default-app';
            
            const authRef = useRef(null);
            const dbRef = useRef(null);

            // 監聽 Firebase 是否就緒
            useEffect(() => {
                const handleFbReady = () => setFbReady(true);
                window.addEventListener('firebase-ready', handleFbReady);
                return () => window.removeEventListener('firebase-ready', handleFbReady);
            }, []);

            // 初始化 Firebase (Rule 3)
            useEffect(() => {
                if (fbReady && window.FB && firebaseConfig.apiKey) {
                    const app = window.FB.initializeApp(firebaseConfig);
                    authRef.current = window.FB.getAuth(app);
                    dbRef.current = window.FB.getFirestore(app);

                    const initAuth = async () => {
                        if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
                            try {
                                await window.FB.signInWithCustomToken(authRef.current, window.__initial_auth_token);
                            } catch(e) {
                                console.error("Custom token login failed", e);
                            }
                        }
                    };
                    initAuth();

                    const unsubscribe = window.FB.onAuthStateChanged(authRef.current, (u) => {
                        setUser(u);
                        setAuthLoading(false);
                    });
                    return () => unsubscribe();
                }
            }, [fbReady]);

            // 讀取資料 (Rule 1 & 2)
            useEffect(() => {
                if (dbRef.current && user) {
                    const templatesRef = window.FB.collection(dbRef.current, 'artifacts', appId, 'users', user.uid, 'templates');
                    const unsubscribe = window.FB.onSnapshot(templatesRef, (snapshot) => {
                        const data = snapshot.docs.map(doc => ({ ...doc.data(), id: doc.id }));
                        setTemplates(data);
                    }, (err) => console.error("Firestore error:", err));
                    return () => unsubscribe();
                }
            }, [user]);

            const handleSave = async (data) => {
                if (!dbRef.current || !user) return;
                const templateId = data.id || Date.now().toString();
                const docRef = window.FB.doc(dbRef.current, 'artifacts', appId, 'users', user.uid, 'templates', templateId);
                await window.FB.setDoc(docRef, { ...data, id: templateId, updatedAt: Date.now() });
                setActiveTab('list');
            };

            const handleDelete = async (id) => {
                if (confirm("確定要刪除嗎？") && dbRef.current && user) {
                    const docRef = window.FB.doc(dbRef.current, 'artifacts', appId, 'users', user.uid, 'templates', id);
                    await window.FB.deleteDoc(docRef);
                }
            };

            const handleLogout = () => {
                if (authRef.current) window.FB.signOut(authRef.current);
            };

            const copyToClipboard = (url, id) => {
                const el = document.createElement('textarea');
                el.value = url;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopyFeedback(id);
                setTimeout(() => setCopyFeedback(null), 2000);
            };

            const calculateSize = (comp, addW, addH, sa) => {
                let w = parseFloat(comp.baseW) || 0;
                let h = parseFloat(comp.baseH) || 0;
                const offset = comp.includeSA ? parseFloat(sa) || 0 : 0;
                if (comp.type === 'both') { w += parseFloat(addW) || 0; h += parseFloat(addH) || 0; }
                else if (comp.type === 'width') { w += parseFloat(addW) || 0; }
                else if (comp.type === 'height') { h += parseFloat(addH) || 0; }
                return { w: (w + 2 * offset).toFixed(1), h: (h + 2 * offset).toFixed(1) };
            };

            const AuthForm = () => {
                const [email, setEmail] = useState('');
                const [password, setPassword] = useState('');
                const [isSignUp, setIsSignUp] = useState(false);
                const [error, setError] = useState('');

                const handleSubmit = async (e) => {
                    e.preventDefault();
                    setError('');
                    try {
                        if (isSignUp) {
                            await window.FB.createUserWithEmailAndPassword(authRef.current, email, password);
                        } else {
                            await window.FB.signInWithEmailAndPassword(authRef.current, email, password);
                        }
                    } catch (err) {
                        setError("驗證失敗：請檢查輸入資訊。");
                    }
                };

                return (
                    <div className="flex flex-col items-center justify-center min-h-[80vh] px-4">
                        <div className="bubble-card p-10 w-full max-w-md border-white">
                            <div className="text-center mb-8">
                                <div className="bg-sky-400 w-16 h-16 rounded-[1.5rem] flex items-center justify-center text-white mx-auto mb-4 shadow-lg shadow-sky-100">
                                    <Icon name="scissors" size={32} />
                                </div>
                                <h2 className="text-2xl font-black">裁縫小助手</h2>
                                <p className="text-slate-400 font-medium mt-2">請登入以同步您的模板資料</p>
                            </div>
                            <form onSubmit={handleSubmit} className="space-y-4">
                                <input type="email" placeholder="電子信箱" value={email} onChange={e => setEmail(e.target.value)} className="w-full bg-sky-50/50 p-4 rounded-2xl outline-none border-2 border-transparent focus:border-sky-200 font-bold" required />
                                <input type="password" placeholder="密碼" value={password} onChange={e => setPassword(e.target.value)} className="w-full bg-sky-50/50 p-4 rounded-2xl outline-none border-2 border-transparent focus:border-sky-200 font-bold" required />
                                {error && <p className="text-rose-500 text-xs font-bold px-2">{error}</p>}
                                <button type="submit" className="w-full bg-sky-400 text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 transition-all">
                                    {isSignUp ? '立即註冊' : '登入系統'}
                                </button>
                            </form>
                            <button onClick={() => setIsSignUp(!isSignUp)} className="w-full mt-6 text-sm font-bold text-sky-500">
                                {isSignUp ? '已有帳號？返回登入' : '還沒有帳號？點此註冊'}
                            </button>
                        </div>
                    </div>
                );
            };

            if (authLoading) return <div className="flex items-center justify-center min-h-screen text-sky-300 font-bold">載入中...</div>;
            if (!user) return <AuthForm />;

            return (
                <div className="max-w-2xl mx-auto min-h-screen relative px-4 pt-4 pb-32">
                    <header className="flex justify-between items-center mb-8 px-2">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={() => setActiveTab('list')}>
                            <div className="bg-sky-400 p-2.5 rounded-[1.2rem] text-white shadow-lg">
                                <Icon name="scissors" size={24} />
                            </div>
                            <h1 className="text-2xl font-black italic">裁縫小助手</h1>
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={handleLogout} title="登出" className="p-2.5 text-slate-400 hover:text-rose-500 bg-white rounded-xl border border-sky-50">
                                <Icon name="log-out" size={20} />
                            </button>
                            {activeTab === 'list' && (
                                <button onClick={() => { 
                                    setCurrentTemplate({ name: '新作品', baseWidth: 14, baseHeight: 11.5, seamAllowance: 1.0, components: [{ id: 1, name: '表布', baseW: 14, baseH: 11.5, type: 'both', quantity: 2, includeSA: true }], links: [] });
                                    setActiveTab('edit');
                                }} className="bg-sky-400 text-white px-6 py-2.5 rounded-full font-bold shadow-md active:scale-95">新增作品</button>
                            )}
                        </div>
                    </header>

                    <div className="page-transition">
                        {activeTab === 'list' && (
                            <div className="grid gap-4">
                                {templates.length === 0 ? (
                                    <div className="text-center py-20 bubble-card border-dashed border-2 border-sky-100 shadow-none bg-transparent">
                                        <Icon name="sparkles" size={48} className="mx-auto text-sky-200 mb-4" />
                                        <p className="text-sky-300 font-bold">目前尚無模板</p>
                                    </div>
                                ) : (
                                    templates.map(t => (
                                        <div key={t.id} className="bubble-card p-6 flex justify-between items-center border-white">
                                            <div className="flex-1 mr-4">
                                                <h3 className="text-xl font-black mb-1 truncate">{t.name}</h3>
                                                <div className="flex gap-3 text-sm font-bold text-sky-400">
                                                    <span className="bg-sky-50 px-2 py-0.5 rounded-lg">{t.baseWidth}×{t.baseHeight}cm</span>
                                                    <span>縫份 {t.seamAllowance}cm</span>
                                                </div>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => { setCurrentTemplate(t); setScaleInput({addW:0,addH:0}); setActiveTab('calculate'); }} className="p-3 text-sky-400 bg-sky-50 rounded-2xl"><Icon name="calculator" size={20} /></button>
                                                <button onClick={() => { setCurrentTemplate(t); setActiveTab('edit'); }} className="p-3 text-slate-400 bg-slate-50 rounded-2xl"><Icon name="settings-2" size={20} /></button>
                                                <button onClick={() => handleDelete(t.id)} className="p-3 text-rose-300 bg-rose-50 rounded-2xl"><Icon name="trash-2" size={20} /></button>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}

                        {activeTab === 'edit' && currentTemplate && (
                            <div className="space-y-6">
                                <div className="bubble-card p-8 border-white">
                                    <h2 className="text-xl font-black mb-6 flex items-center gap-2"><Icon name="settings-2" className="text-sky-400"/> 基本設定</h2>
                                    <div className="space-y-6">
                                        <div>
                                            <label className="text-xs font-black text-black/30 block mb-2">作品名稱</label>
                                            <input type="text" value={currentTemplate.name} onChange={e => setCurrentTemplate({...currentTemplate, name: e.target.value})} className="w-full bg-sky-50/50 rounded-2xl p-4 font-black outline-none" />
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="text-xs font-black text-black/30 mb-2 block">基準尺寸 (寬×高)</label>
                                                <div className="flex items-center gap-2">
                                                    <input type="number" value={currentTemplate.baseWidth} onChange={e => setCurrentTemplate({...currentTemplate, baseWidth: e.target.value})} className="w-full bg-sky-50/30 rounded-2xl p-4 text-center font-black outline-none" />
                                                    <input type="number" value={currentTemplate.baseHeight} onChange={e => setCurrentTemplate({...currentTemplate, baseHeight: e.target.value})} className="w-full bg-sky-50/30 rounded-2xl p-4 text-center font-black outline-none" />
                                                </div>
                                            </div>
                                            <div>
                                                <label className="text-xs font-black text-black/30 mb-2 block">預設縫份 (cm)</label>
                                                <input type="number" step="0.1" value={currentTemplate.seamAllowance} onChange={e => setCurrentTemplate({...currentTemplate, seamAllowance: e.target.value})} className="w-full bg-cyan-50 border-2 border-cyan-100 rounded-2xl p-4 text-center font-black text-cyan-600 outline-none" />
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* 🌸 教學連結編輯區 (修正遺失功能) 🌸 */}
                                <div className="bubble-card p-8 border-white">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-xl font-black flex items-center gap-2"><Icon name="link" className="text-sky-400"/> 教學連結管理</h2>
                                        <button onClick={() => setCurrentTemplate({...currentTemplate, links: [...(currentTemplate.links || []), {id: Date.now(), title:'', url:''}]})} className="text-xs font-black text-sky-500 bg-sky-50 px-3 py-1.5 rounded-xl">+ 新增連結</button>
                                    </div>
                                    <div className="space-y-4">
                                        {(currentTemplate.links || []).map((link, idx) => (
                                            <div key={link.id} className="flex gap-3 p-4 bg-sky-50/20 rounded-[1.5rem] items-center">
                                                <div className="flex-1 space-y-2">
                                                    <input type="text" placeholder="教學標題 (如: 裡布縫法)" value={link.title} onChange={e => { const nl = [...currentTemplate.links]; nl[idx].title = e.target.value; setCurrentTemplate({...currentTemplate, links: nl}); }} className="w-full bg-white p-2 rounded-lg text-sm font-black outline-none" />
                                                    <input type="text" placeholder="URL 網址" value={link.url} onChange={e => { const nl = [...currentTemplate.links]; nl[idx].url = e.target.value; setCurrentTemplate({...currentTemplate, links: nl}); }} className="w-full bg-white/50 p-2 rounded-lg text-xs font-medium outline-none" />
                                                </div>
                                                <button onClick={() => setCurrentTemplate({...currentTemplate, links: currentTemplate.links.filter((_, i) => i !== idx)})} className="text-rose-300 hover:text-rose-500"><Icon name="trash-2" size={20} /></button>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* 零件配置 */}
                                <div className="space-y-4">
                                    <div className="flex justify-between items-center px-4">
                                        <h2 className="text-xl font-black flex items-center gap-2"><Icon name="ruler" className="text-sky-400"/> 零件配置</h2>
                                        <button onClick={() => setCurrentTemplate({...currentTemplate, components: [...currentTemplate.components, {id: Date.now(), name:'新零件', baseW:10, baseH:10, type:'both', quantity:1, includeSA:true}]})} className="bg-sky-400 text-white px-5 py-2 rounded-2xl font-black text-sm shadow-md">+ 增加零件</button>
                                    </div>
                                    {currentTemplate.components.map((comp, idx) => (
                                        <div key={comp.id} className="bubble-card p-6 border-white space-y-4">
                                            <div className="flex justify-between items-center">
                                                <input type="text" value={comp.name} onChange={e => { const nc = [...currentTemplate.components]; nc[idx].name = e.target.value; setCurrentTemplate({...currentTemplate, components: nc}); }} className="font-black text-xl bg-transparent border-b-2 border-transparent focus:border-sky-100 outline-none" />
                                                <label className="flex items-center gap-2 cursor-pointer">
                                                    <span className={`text-[10px] font-black uppercase ${comp.includeSA ? 'text-black':'text-slate-300'}`}>計算縫份</span>
                                                    <div onClick={() => { const nc = [...currentTemplate.components]; nc[idx].includeSA = !nc[idx].includeSA; setCurrentTemplate({...currentTemplate, components: nc}); }} className={`w-10 h-5 rounded-full relative transition-all ${comp.includeSA ? 'bg-sky-400':'bg-slate-200'}`}>
                                                        <div className={`absolute top-1 w-3 h-3 bg-white rounded-full shadow-sm transition-all ${comp.includeSA ? 'left-6':'left-1'}`} />
                                                    </div>
                                                </label>
                                            </div>
                                            <div className="grid grid-cols-4 gap-3">
                                                {/* 修正 brittle Object.values 邏輯 */}
                                                {[
                                                    { key: 'baseW', label: '寬' },
                                                    { key: 'baseH', label: '高' },
                                                    { key: 'quantity', label: '數量' }
                                                ].map((field) => (
                                                    <div key={field.key} className="text-center">
                                                        <label className="text-[9px] font-black text-black/20 block mb-1">{field.label}</label>
                                                        <input type="number" value={comp[field.key]} onChange={e => { 
                                                            const nc = [...currentTemplate.components]; 
                                                            nc[idx][field.key] = e.target.value; 
                                                            setCurrentTemplate({...currentTemplate, components: nc}); 
                                                        }} className="w-full bg-sky-50/50 p-2 rounded-xl text-center font-black outline-none" />
                                                    </div>
                                                ))}
                                                <div className="text-center">
                                                    <label className="text-[9px] font-black text-black/20 block mb-1">規則</label>
                                                    <select value={comp.type} onChange={e => { const nc = [...currentTemplate.components]; nc[idx].type = e.target.value; setCurrentTemplate({...currentTemplate, components: nc}); }} className="w-full bg-sky-50/50 p-2 rounded-xl font-black text-[10px] outline-none appearance-none text-center">
                                                        {COMPONENT_TYPES.map(o => <option key={o.id} value={o.id}>{o.label}</option>)}
                                                    </select>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="flex gap-4 pt-6 pb-12">
                                    <button onClick={() => handleSave(currentTemplate)} className="flex-1 bg-sky-400 text-white font-black py-5 rounded-[2rem] shadow-xl active:scale-95 transition-all">雲端儲存</button>
                                    <button onClick={() => setActiveTab('list')} className="px-10 bg-slate-100 text-slate-500 font-black py-5 rounded-[2rem]">取消</button>
                                </div>
                            </div>
                        )}

                        {activeTab === 'calculate' && currentTemplate && (
                            <div className="space-y-8 animate-in fade-in pb-20">
                                <div className="bg-gradient-to-br from-sky-300 via-sky-400 to-cyan-400 text-white p-10 rounded-[3rem] shadow-2xl relative overflow-hidden">
                                    <h2 className="text-3xl font-black mb-8 relative z-10">{currentTemplate.name}</h2>
                                    <div className="grid grid-cols-2 gap-8 relative z-10">
                                        <div className="space-y-3">
                                            <label className="text-[10px] font-black opacity-80 uppercase tracking-widest ml-4">寬度增加 (W)</label>
                                            <input type="number" value={scaleInput.addW} onChange={e => setScaleInput({...scaleInput, addW: e.target.value})} className="w-full bg-white/20 backdrop-blur-md border-2 border-white/30 rounded-[2rem] p-6 text-white font-black text-4xl outline-none" />
                                        </div>
                                        <div className="space-y-3">
                                            <label className="text-[10px] font-black opacity-80 uppercase tracking-widest ml-4">高度增加 (H)</label>
                                            <input type="number" value={scaleInput.addH} onChange={e => setScaleInput({...scaleInput, addH: e.target.value})} className="w-full bg-white/20 backdrop-blur-md border-2 border-white/30 rounded-[2rem] p-6 text-white font-black text-4xl outline-none" />
                                        </div>
                                    </div>
                                </div>

                                {/* 🌸 教學連結顯示區 (修正遺失功能) 🌸 */}
                                {currentTemplate.links?.length > 0 && (
                                    <div className="space-y-3">
                                        <h3 className="font-black flex items-center gap-2 px-4 text-lg"><Icon name="book-open" className="text-sky-400"/> 教學與參考連結</h3>
                                        <div className="grid gap-2">
                                            {currentTemplate.links.map(l => (
                                                <div key={l.id} className="bubble-card p-5 flex items-center justify-between border-white">
                                                    <div className="flex-1 overflow-hidden mr-4">
                                                        <h4 className="font-black text-sm truncate">{l.title || '無標題連結'}</h4>
                                                        <p className="text-[10px] text-sky-300 font-bold truncate">{l.url}</p>
                                                    </div>
                                                    <button onClick={() => copyToClipboard(l.url, l.id)} className={`flex items-center gap-2 px-5 py-2.5 rounded-2xl text-[10px] font-black transition-all ${copyFeedback === l.id ? 'bg-emerald-500 text-white shadow-lg':'bg-sky-50 text-black border border-sky-100'}`}>
                                                        {copyFeedback === l.id ? '已複製' : '複製網址'}
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                <div className="space-y-4">
                                    <h3 className="font-black flex items-center gap-2 px-4 text-lg"><Icon name="scissors" className="text-sky-400"/> 最終裁切清單</h3>
                                    {currentTemplate.components.map(comp => {
                                        const res = calculateSize(comp, scaleInput.addW, scaleInput.addH, currentTemplate.seamAllowance);
                                        return (
                                            <div key={comp.id} className="bubble-card p-6 flex items-center gap-6 border-white">
                                                <div className="w-16 h-16 rounded-[1.5rem] bg-sky-400 text-white flex flex-col items-center justify-center font-black shadow-lg">
                                                    <span className="text-[9px] opacity-70">數量</span>
                                                    <span className="text-2xl leading-none">{comp.quantity}</span>
                                                </div>
                                                <div className="flex-1">
                                                    <div className="flex justify-between items-center mb-1">
                                                        <span className="font-black text-lg">{comp.name}</span>
                                                        <span className={`text-[8px] font-black uppercase px-2 py-0.5 rounded-full ${comp.includeSA ? 'bg-cyan-400 text-white':'bg-slate-100 text-slate-300'}`}>{comp.includeSA ? '含縫份':'淨尺寸'}</span>
                                                    </div>
                                                    <div className="flex items-baseline gap-1">
                                                        <span className="text-4xl font-black">{res.w} <span className="text-xl font-normal text-sky-100">×</span> {res.h}</span>
                                                        <span className="text-xs font-black text-sky-200 uppercase ml-1">cm</span>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                                <button onClick={() => setActiveTab('list')} className="w-full py-5 text-sky-300 font-black bg-white/60 border-2 border-white rounded-[2rem] shadow-sm active:scale-95 transition-all">返回列表</button>
                            </div>
                        )}
                    </div>

                    <nav className="fixed bottom-6 left-6 right-6 max-w-2xl mx-auto z-40 p-3 rounded-[2.5rem] nav-glass flex justify-around items-center bubble-shadow border border-sky-50">
                        <button onClick={() => setActiveTab('list')} className={`flex flex-col items-center py-2 px-8 rounded-2xl transition-all ${activeTab === 'list' ? 'text-black bg-sky-50 font-black shadow-inner' : 'text-slate-300 font-bold'}`}>
                            <Icon name="home" size={22} className="mb-1" />
                            <span className="text-[10px]">我的作品</span>
                        </button>
                        <button onClick={() => { 
                            setCurrentTemplate({ name: '新作品', baseWidth: 14, baseHeight: 11.5, seamAllowance: 1.0, components: [{ id: Date.now(), name: '表布', baseW: 14, baseH: 11.5, type: 'both', quantity: 2, includeSA: true }], links: [] });
                            setActiveTab('edit');
                        }} className={`flex flex-col items-center py-2 px-8 rounded-2xl transition-all ${activeTab === 'edit' ? 'text-black bg-sky-50 font-black shadow-inner' : 'text-slate-300 font-bold'}`}>
                            <Icon name="plus" size={22} className="mb-1" />
                            <span className="text-[10px]">建立模板</span>
                        </button>
                        <button onClick={() => { if(currentTemplate) setActiveTab('calculate'); }} className={`flex flex-col items-center py-2 px-8 rounded-2xl transition-all ${activeTab === 'calculate' ? 'text-black bg-sky-50 font-black shadow-inner' : 'text-slate-300 font-bold'} ${!currentTemplate ? 'opacity-20 pointer-events-none':''}`}>
                            <Icon name="calculator" size={22} className="mb-1" />
                            <span className="text-[10px]">尺寸計算</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
