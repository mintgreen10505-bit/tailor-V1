<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>裁縫小助手 - 海鹽氣泡版</title>
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 載入 React 核心 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 載入 Babel 轉換 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 載入 Lucide 圖示 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        :root {
            --sea-salt-bg: #faffff; /* 更淡的海鹽藍背景 */
            --bubble-blue: #e0f7fa; /* 氣泡淺藍 */
            --accent-blue: #38bdf8; /* 主色調藍 */
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--sea-salt-bg);
            color: #000000; /* 確保字體為純黑 */
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .bubble-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px rgba(186, 230, 253, 0.2);
            border-radius: 2.5rem;
        }

        .nav-glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(224, 242, 254, 0.5);
        }

        /* 隱藏數字輸入框的上下箭頭 */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* 滑順轉場 */
        .page-transition {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 圖示組件
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        function App() {
            const [activeTab, setActiveTab] = useState('list');
            const [templates, setTemplates] = useState([]);
            const [currentTemplate, setCurrentTemplate] = useState(null);
            const [scaleInput, setScaleInput] = useState({ addW: 0, addH: 0 });
            const [copyFeedback, setCopyFeedback] = useState(null);

            // 讀取本地儲存
            useEffect(() => {
                const saved = localStorage.getItem('sewing_scaler_v2');
                if (saved) setTemplates(JSON.parse(saved));
            }, []);

            const updateTemplates = (newTemplates) => {
                setTemplates(newTemplates);
                localStorage.setItem('sewing_scaler_v2', JSON.stringify(newTemplates));
            };

            const handleSave = (data) => {
                const updated = data.id 
                    ? templates.map(t => t.id === data.id ? data : t)
                    : [...templates, { ...data, id: Date.now() }];
                updateTemplates(updated);
                setActiveTab('list');
            };

            const handleDelete = (id) => {
                if (confirm("確定要刪除這個模板嗎？")) {
                    updateTemplates(templates.filter(t => t.id !== id));
                }
            };

            const createNew = () => {
                setCurrentTemplate({
                    name: '我的新作品',
                    baseWidth: 14,
                    baseHeight: 11.5,
                    seamAllowance: 1.0,
                    components: [
                        { id: 1, name: '表布', baseW: 14, baseH: 11.5, type: 'both', quantity: 2, includeSA: true },
                        { id: 2, name: '拉鍊', baseW: 13, baseH: 1, type: 'width', quantity: 1, includeSA: false }
                    ],
                    links: []
                });
                setActiveTab('edit');
            };

            const copyToClipboard = (url, id) => {
                const el = document.createElement('textarea');
                el.value = url;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopyFeedback(id);
                setTimeout(() => setCopyFeedback(null), 2000);
            };

            const calculate = (comp, addW, addH, sa) => {
                let w = parseFloat(comp.baseW) || 0;
                let h = parseFloat(comp.baseH) || 0;
                const offset = comp.includeSA ? parseFloat(sa) || 0 : 0;

                if (comp.type === 'both') {
                    w += parseFloat(addW) || 0;
                    h += parseFloat(addH) || 0;
                } else if (comp.type === 'width') {
                    w += parseFloat(addW) || 0;
                } else if (comp.type === 'height') {
                    h += parseFloat(addH) || 0;
                }

                return {
                    w: (w + 2 * offset).toFixed(1),
                    h: (h + 2 * offset).toFixed(1)
                };
            };

            return (
                <div className="max-w-2xl mx-auto min-h-screen relative px-4 pt-4 pb-32">
                    {/* Header */}
                    <header className="flex justify-between items-center mb-8 px-2">
                        <div className="flex items-center gap-3" onClick={() => setActiveTab('list')}>
                            <div className="bg-sky-400 p-2.5 rounded-[1.2rem] text-white shadow-lg shadow-sky-100">
                                <Icon name="scissors" size={24} />
                            </div>
                            <h1 className="text-2xl font-black tracking-tight italic">裁縫小助手</h1>
                        </div>
                        {activeTab === 'list' && (
                            <button onClick={createNew} className="bg-sky-400 hover:bg-sky-500 text-white px-6 py-2.5 rounded-full font-bold shadow-md transition-all active:scale-95">
                                新增作品
                            </button>
                        )}
                    </header>

                    {/* Content */}
                    <div className="page-transition">
                        {activeTab === 'list' && (
                            <div className="grid gap-4">
                                {templates.length === 0 ? (
                                    <div className="text-center py-20 bubble-card border-dashed border-2 border-sky-100 bg-transparent shadow-none">
                                        <Icon name="sparkles" size={48} className="mx-auto text-sky-200 mb-4" />
                                        <p className="text-sky-300 font-bold">還沒有任何模板，點擊上方按鈕建立</p>
                                    </div>
                                ) : (
                                    templates.map(t => (
                                        <div key={t.id} className="bubble-card p-6 flex justify-between items-center group border-white">
                                            <div>
                                                <h3 className="text-xl font-black mb-1">{t.name}</h3>
                                                <div className="flex gap-3 text-sm font-bold text-sky-400">
                                                    <span className="bg-sky-50 px-2 py-0.5 rounded-lg">{t.baseWidth}×{t.baseHeight}cm</span>
                                                    <span>縫份 {t.seamAllowance}cm</span>
                                                </div>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => { setCurrentTemplate(t); setScaleInput({addW:0,addH:0}); setActiveTab('calculate'); }} className="p-3 text-sky-400 bg-sky-50 rounded-2xl hover:bg-sky-400 hover:text-white transition-all"><Icon name="calculator" size={20} /></button>
                                                <button onClick={() => { setCurrentTemplate(t); setActiveTab('edit'); }} className="p-3 text-slate-400 bg-slate-50 rounded-2xl hover:bg-slate-200 transition-all"><Icon name="settings-2" size={20} /></button>
                                                <button onClick={() => handleDelete(t.id)} className="p-3 text-rose-300 bg-rose-50 rounded-2xl hover:bg-rose-500 hover:text-white transition-all"><Icon name="trash-2" size={20} /></button>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}

                        {activeTab === 'edit' && currentTemplate && (
                            <div className="space-y-6">
                                <div className="bubble-card p-8 border-white">
                                    <h2 className="text-xl font-black mb-6 flex items-center gap-2"><Icon name="settings-2" className="text-sky-400"/> 基本設定</h2>
                                    <div className="space-y-6">
                                        <div>
                                            <label className="text-xs font-black text-black/30 uppercase mb-2 block">作品名稱</label>
                                            <input type="text" value={currentTemplate.name} onChange={e => setCurrentTemplate({...currentTemplate, name: e.target.value})} className="w-full bg-sky-50/50 border-2 border-transparent focus:border-sky-100 rounded-2xl p-4 font-black outline-none" />
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="text-xs font-black text-black/30 mb-2 block">基準尺寸 (寬×高)</label>
                                                <div className="flex items-center gap-2">
                                                    <input type="number" value={currentTemplate.baseWidth} onChange={e => setCurrentTemplate({...currentTemplate, baseWidth: e.target.value})} className="w-full bg-sky-50/30 rounded-2xl p-4 text-center font-black outline-none" />
                                                    <input type="number" value={currentTemplate.baseHeight} onChange={e => setCurrentTemplate({...currentTemplate, baseHeight: e.target.value})} className="w-full bg-sky-50/30 rounded-2xl p-4 text-center font-black outline-none" />
                                                </div>
                                            </div>
                                            <div>
                                                <label className="text-xs font-black text-black/30 mb-2 block">預設縫份 (cm)</label>
                                                <input type="number" step="0.1" value={currentTemplate.seamAllowance} onChange={e => setCurrentTemplate({...currentTemplate, seamAllowance: e.target.value})} className="w-full bg-cyan-50 border-2 border-cyan-100 rounded-2xl p-4 text-center font-black text-cyan-600 outline-none" />
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bubble-card p-8 border-white">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-xl font-black flex items-center gap-2"><Icon name="link" className="text-sky-400"/> 教學連結</h2>
                                        <button onClick={() => setCurrentTemplate({...currentTemplate, links: [...(currentTemplate.links || []), {id: Date.now(), title:'', url:''}]})} className="text-xs font-black text-sky-500 bg-sky-50 px-3 py-1.5 rounded-xl">+ 新增網址</button>
                                    </div>
                                    <div className="space-y-4">
                                        {currentTemplate.links?.map((link, idx) => (
                                            <div key={link.id} className="flex gap-3 p-4 bg-sky-50/20 rounded-[1.5rem] items-center">
                                                <div className="flex-1 space-y-2">
                                                    <input type="text" placeholder="教學標題" value={link.title} onChange={e => { const nl = [...currentTemplate.links]; nl[idx].title = e.target.value; setCurrentTemplate({...currentTemplate, links: nl}); }} className="w-full bg-white p-2 rounded-lg text-sm font-black outline-none" />
                                                    <input type="text" placeholder="URL" value={link.url} onChange={e => { const nl = [...currentTemplate.links]; nl[idx].url = e.target.value; setCurrentTemplate({...currentTemplate, links: nl}); }} className="w-full bg-white/50 p-2 rounded-lg text-xs font-medium outline-none" />
                                                </div>
                                                <button onClick={() => setCurrentTemplate({...currentTemplate, links: currentTemplate.links.filter((_, i) => i !== idx)})} className="text-sky-200 hover:text-rose-500"><Icon name="trash-2" size={20} /></button>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <div className="flex justify-between items-center px-4">
                                        <h2 className="text-xl font-black flex items-center gap-2"><Icon name="ruler" className="text-sky-400"/> 零件配置</h2>
                                        <button onClick={() => setCurrentTemplate({...currentTemplate, components: [...currentTemplate.components, {id: Date.now(), name:'新零件', baseW:10, baseH:10, type:'both', quantity:1, includeSA:true}]})} className="bg-sky-400 text-white px-5 py-2 rounded-2xl font-black text-sm shadow-md">+ 增加零件</button>
                                    </div>
                                    {currentTemplate.components.map((comp, idx) => (
                                        <div key={comp.id} className="bubble-card p-6 border-white space-y-4">
                                            <div className="flex justify-between items-center">
                                                <input type="text" value={comp.name} onChange={e => { const nc = [...currentTemplate.components]; nc[idx].name = e.target.value; setCurrentTemplate({...currentTemplate, components: nc}); }} className="font-black text-xl bg-transparent border-b-2 border-transparent focus:border-sky-100 outline-none" />
                                                <label className="flex items-center gap-2 cursor-pointer">
                                                    <span className={`text-[10px] font-black uppercase ${comp.includeSA ? 'text-black':'text-slate-300'}`}>計算縫份</span>
                                                    <div onClick={() => { const nc = [...currentTemplate.components]; nc[idx].includeSA = !nc[idx].includeSA; setCurrentTemplate({...currentTemplate, components: nc}); }} className={`w-10 h-5 rounded-full relative transition-all ${comp.includeSA ? 'bg-sky-400':'bg-slate-200'}`}>
                                                        <div className={`absolute top-1 w-3 h-3 bg-white rounded-full shadow-sm transition-all ${comp.includeSA ? 'left-6':'left-1'}`} />
                                                    </div>
                                                </label>
                                            </div>
                                            <div className="grid grid-cols-4 gap-3">
                                                <div className="text-center">
                                                    <label className="text-[9px] font-black text-black/20 block mb-1">原始寬</label>
                                                    <input type="number" value={comp.baseW} onChange={e => { const nc = [...currentTemplate.components]; nc[idx].baseW = e.target.value; setCurrentTemplate({...currentTemplate, components: nc}); }} className="w-full bg-sky-50/50 p-2 rounded-xl text-center font-black outline-none" />
                                                </div>
                                                <div className="text-center">
                                                    <label className="text-[9px] font-black text-black/20 block mb-1">原始高</label>
                                                    <input type="number" value={comp.baseH} onChange={e => { const nc = [...currentTemplate.components]; nc[idx].baseH = e.target.value; setCurrentTemplate({...currentTemplate, components: nc}); }} className="w-full bg-sky-50/50 p-2 rounded-xl text-center font-black outline-none" />
                                                </div>
                                                <div className="text-center">
                                                    <label className="text-[9px] font-black text-black/20 block mb-1">數量</label>
                                                    <input type="number" value={comp.quantity} onChange={e => { const nc = [...currentTemplate.components]; nc[idx].quantity = e.target.value; setCurrentTemplate({...currentTemplate, components: nc}); }} className="w-full bg-sky-50/50 p-2 rounded-xl text-center font-black outline-none" />
                                                </div>
                                                <div className="text-center">
                                                    <label className="text-[9px] font-black text-black/20 block mb-1">規則</label>
                                                    <select value={comp.type} onChange={e => { const nc = [...currentTemplate.components]; nc[idx].type = e.target.value; setCurrentTemplate({...currentTemplate, components: nc}); }} className="w-full bg-sky-50/50 p-2 rounded-xl font-black text-[10px] outline-none appearance-none text-center">
                                                        {COMPONENT_TYPES.map(o => <option key={o.id} value={o.id}>{o.label}</option>)}
                                                    </select>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="flex gap-4 pt-6 pb-12">
                                    <button onClick={() => handleSave(currentTemplate)} className="flex-1 bg-sky-400 text-white font-black py-5 rounded-[2rem] shadow-xl active:scale-95 transition-all">儲存模板</button>
                                    <button onClick={() => setActiveTab('list')} className="px-10 bg-slate-100 text-slate-500 font-black py-5 rounded-[2rem]">取消</button>
                                </div>
                            </div>
                        )}

                        {activeTab === 'calculate' && currentTemplate && (
                            <div className="space-y-8 animate-in fade-in">
                                <div className="bg-gradient-to-br from-sky-300 via-sky-400 to-cyan-400 text-white p-10 rounded-[3rem] shadow-2xl relative overflow-hidden">
                                    <div className="absolute -right-10 -top-10 w-48 h-48 bg-white/10 rounded-full blur-2xl"></div>
                                    <h2 className="text-3xl font-black mb-8 relative z-10">{currentTemplate.name}</h2>
                                    <div className="grid grid-cols-2 gap-8 relative z-10">
                                        <div className="space-y-3">
                                            <label className="text-[10px] font-black opacity-80 uppercase tracking-widest ml-4">寬度增加 (W)</label>
                                            <input type="number" value={scaleInput.addW} onChange={e => setScaleInput({...scaleInput, addW: e.target.value})} className="w-full bg-white/20 backdrop-blur-md border-2 border-white/30 rounded-[2rem] p-6 text-white font-black text-4xl outline-none" />
                                        </div>
                                        <div className="space-y-3">
                                            <label className="text-[10px] font-black opacity-80 uppercase tracking-widest ml-4">高度增加 (H)</label>
                                            <input type="number" value={scaleInput.addH} onChange={e => setScaleInput({...scaleInput, addH: e.target.value})} className="w-full bg-white/20 backdrop-blur-md border-2 border-white/30 rounded-[2rem] p-6 text-white font-black text-4xl outline-none" />
                                        </div>
                                    </div>
                                </div>

                                {currentTemplate.links?.length > 0 && (
                                    <div className="space-y-4">
                                        <h3 className="font-black flex items-center gap-2 px-4 text-lg"><Icon name="book-open" className="text-sky-400"/> 教學連結</h3>
                                        <div className="grid gap-3">
                                            {currentTemplate.links.map(l => (
                                                <div key={l.id} className="bubble-card p-5 flex items-center justify-between border-white">
                                                    <div className="flex-1 overflow-hidden mr-4">
                                                        <h4 className="font-black text-sm truncate">{l.title || '無標題'}</h4>
                                                        <p className="text-[10px] text-sky-300 font-bold truncate">{l.url}</p>
                                                    </div>
                                                    <button onClick={() => copyToClipboard(l.url, l.id)} className={`flex items-center gap-2 px-5 py-2.5 rounded-2xl text-[10px] font-black transition-all ${copyFeedback === l.id ? 'bg-emerald-500 text-white shadow-lg':'bg-sky-50 text-black border border-sky-100'}`}>
                                                        {copyFeedback === l.id ? '已複製' : '複製網址'}
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                <div className="space-y-4">
                                    <h3 className="font-black flex items-center gap-2 px-4 text-lg"><Icon name="scissors" className="text-sky-400"/> 最終裁切清單</h3>
                                    {currentTemplate.components.map(comp => {
                                        const res = calculate(comp, scaleInput.addW, scaleInput.addH, currentTemplate.seamAllowance);
                                        return (
                                            <div key={comp.id} className="bubble-card p-6 flex items-center gap-6 border-white">
                                                <div className="w-16 h-16 rounded-[1.5rem] bg-sky-400 text-white flex flex-col items-center justify-center font-black shadow-lg">
                                                    <span className="text-[9px] opacity-70">數量</span>
                                                    <span className="text-2xl leading-none">{comp.quantity}</span>
                                                </div>
                                                <div className="flex-1">
                                                    <div className="flex justify-between items-center mb-1">
                                                        <span className="font-black text-lg">{comp.name}</span>
                                                        <span className={`text-[8px] font-black uppercase px-2 py-0.5 rounded-full ${comp.includeSA ? 'bg-cyan-400 text-white':'bg-slate-100 text-slate-300'}`}>{comp.includeSA ? '含縫份':'淨尺寸'}</span>
                                                    </div>
                                                    <div className="flex items-baseline gap-1">
                                                        <span className="text-4xl font-black">{res.w} <span className="text-xl font-normal text-sky-100">×</span> {res.h}</span>
                                                        <span className="text-xs font-black text-sky-200 uppercase ml-1">cm</span>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>

                                <button onClick={() => setActiveTab('list')} className="w-full py-5 text-sky-300 font-black bg-white/60 border-2 border-white rounded-[2rem] shadow-sm active:scale-95 mb-10 transition-all">返回列表</button>
                            </div>
                        )}
                    </div>

                    {/* Footer Nav */}
                    <nav className="fixed bottom-6 left-6 right-6 max-w-2xl mx-auto z-40 p-3 rounded-[2.5rem] nav-glass flex justify-around items-center bubble-shadow border border-sky-50">
                        <button onClick={() => setActiveTab('list')} className={`flex flex-col items-center py-2 px-8 rounded-2xl transition-all ${activeTab === 'list' ? 'text-black bg-sky-50 font-black shadow-inner' : 'text-slate-300 font-bold'}`}>
                            <Icon name="home" size={22} className="mb-1" />
                            <span className="text-[10px]">我的作品</span>
                        </button>
                        <button onClick={createNew} className={`flex flex-col items-center py-2 px-8 rounded-2xl transition-all ${activeTab === 'edit' ? 'text-black bg-sky-50 font-black shadow-inner' : 'text-slate-300 font-bold'}`}>
                            <Icon name="plus" size={22} className="mb-1" />
                            <span className="text-[10px]">建立模板</span>
                        </button>
                        <button onClick={() => { if(currentTemplate) setActiveTab('calculate'); }} className={`flex flex-col items-center py-2 px-8 rounded-2xl transition-all ${activeTab === 'calculate' ? 'text-black bg-sky-50 font-black shadow-inner' : 'text-slate-300 font-bold'} ${!currentTemplate ? 'opacity-20 pointer-events-none':''}`}>
                            <Icon name="calculator" size={22} className="mb-1" />
                            <span className="text-[10px]">尺寸計算</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
