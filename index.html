<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>裁縫小助手</title>
    
    <link rel="icon" type="image/jpeg" href="icon.jpg?v=12">
    <link rel="apple-touch-icon" type="image/jpeg" href="icon.jpg?v=12">    
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        :root { --sea-salt-bg: #f7fdff; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--sea-salt-bg); color: #000; margin: 0; -webkit-tap-highlight-color: transparent; }
        .bubble-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.8); box-shadow: 0 8px 32px rgba(186, 230, 253, 0.2); border-radius: 2.5rem; }
        .nav-glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); border-top: 1px solid rgba(224, 242, 254, 0.5); }
        .page-transition { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FB = { initializeApp, getAuth, onAuthStateChanged, signOut, getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query, orderBy, GoogleAuthProvider, signInWithPopup };
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({ root: iconRef.current, attrs: { width: size, height: size, class: className, stroke: "currentColor", "stroke-width": 2 } });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        const COMPONENT_TYPES = [{ id: 'both', label: '全縮放' }, { id: 'width', label: '僅寬度' }, { id: 'height', label: '僅高度' }, { id: 'fixed', label: '固定' }];

        function App() {
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('list');
            const [templates, setTemplates] = useState([]);
            const [currentTemplate, setCurrentTemplate] = useState(null);
            const [scaleInput, setScaleInput] = useState({ addW: 0, addH: 0 });

            const firebaseConfig = {
                apiKey: "AIzaSyAwajTS9acHu-AS3Ic2f50eThVgo6XxLEM",
                authDomain: "mintgreen-app.firebaseapp.com",
                projectId: "mintgreen-app",
                storageBucket: "mintgreen-app.firebasestorage.app",
                messagingSenderId: "952421896550",
                appId: "1:952421896550:web:a8597a2727c9862e26f8a7"
            };

            const dbRef = useRef(null);
            const authRef = useRef(null);

            useEffect(() => {
                const setupFirebase = () => {
                    if (window.FB) {
                        const app = window.FB.initializeApp(firebaseConfig);
                        authRef.current = window.FB.getAuth(app);
                        dbRef.current = window.FB.getFirestore(app);
                        window.FB.onAuthStateChanged(authRef.current, (u) => { setUser(u); setAuthLoading(false); });
                    }
                };
                if (window.FB) setupFirebase();
                else window.addEventListener('firebase-ready', setupFirebase);
            }, []);

            useEffect(() => {
                if (dbRef.current && user) {
                    // 🌟 對接您截圖中的 inventory 集合 🌟
                    const q = window.FB.query(window.FB.collection(dbRef.current, 'inventory', user.uid, 'items'), window.FB.orderBy('updatedAt', 'desc'));
                    const unsubscribe = window.FB.onSnapshot(q, (snapshot) => {
                        setTemplates(snapshot.docs.map(doc => ({ ...doc.data(), id: doc.id })));
                    });
                    return () => unsubscribe();
                }
            }, [user]);

            const handleSave = async (data) => {
                const id = data.id || Date.now().toString();
                const docRef = window.FB.doc(dbRef.current, 'inventory', user.uid, 'items', id);
                await window.FB.setDoc(docRef, { ...data, id, updatedAt: Date.now() });
                setActiveTab('list');
            };

            const handleDelete = async (id) => {
                if (confirm("確定刪除此模板嗎？")) await window.FB.deleteDoc(window.FB.doc(dbRef.current, 'inventory', user.uid, 'items', id));
            };

            const calculateSize = (comp, addW, addH, sa) => {
                let w = (parseFloat(comp.baseW) || 0) + (comp.type === 'both' || comp.type === 'width' ? parseFloat(addW) || 0 : 0);
                let h = (parseFloat(comp.baseH) || 0) + (comp.type === 'both' || comp.type === 'height' ? parseFloat(addH) || 0 : 0);
                const offset = comp.includeSA ? parseFloat(sa) || 0 : 0;
                return { w: (w + 2 * offset).toFixed(1), h: (h + 2 * offset).toFixed(1) };
            };

            if (authLoading) return <div className="h-screen flex items-center justify-center text-sky-400 font-black">海鹽藍工作台準備中...</div>;

            if (!user) return (
                <div className="h-screen flex flex-col items-center justify-center px-4">
                    <div className="bubble-card p-10 w-full max-w-md text-center border-white shadow-2xl">
                        <div className="bg-sky-400 w-20 h-20 rounded-[2rem] flex items-center justify-center text-white mx-auto mb-6 shadow-lg"><Icon name="scissors" size={40} /></div>
                        <h2 className="text-3xl font-black mb-2 italic">裁縫小助手</h2>
                        <p className="text-slate-400 font-bold mb-10 text-sm">請登入以同步雲端作品</p>
                        <button onClick={() => window.FB.signInWithPopup(authRef.current, new window.FB.GoogleAuthProvider())} className="w-full bg-sky-400 text-white font-black py-5 rounded-3xl shadow-xl flex items-center justify-center gap-3">
                            <Icon name="chrome" size={20} /> Google 帳號登入
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="max-w-2xl mx-auto min-h-screen px-4 pt-4 pb-32">
                    <header className="flex justify-between items-center mb-8 px-2">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={() => setActiveTab('list')}><div className="bg-sky-400 p-2.5 rounded-[1.2rem] text-white shadow-lg"><Icon name="scissors" size={24} /></div><h1 className="text-2xl font-black italic">裁縫小助手</h1></div>
                        <button onClick={() => window.FB.signOut(authRef.current)} className="p-2.5 text-slate-300 bg-white rounded-xl border border-sky-50 shadow-sm"><Icon name="log-out" size={18} /></button>
                    </header>

                    <div className="page-transition">
                        {activeTab === 'list' && (
                            <div className="grid gap-4">
                                {templates.length === 0 ? <div className="text-center py-20 bubble-card border-dashed border-2 border-sky-100 bg-transparent shadow-none"><Icon name="sparkles" size={48} className="mx-auto text-sky-100 mb-4" /><p className="text-sky-300 font-bold">歡迎！點擊下方「建立模板」開始</p></div> : templates.map(t => (
                                    <div key={t.id} className="bubble-card p-6 flex justify-between items-center border-white shadow-sm hover:border-sky-100 transition-all">
                                        <div className="flex-1 mr-4 overflow-hidden"><h3 className="text-xl font-black mb-1 truncate">{t.name}</h3><div className="flex gap-3 text-xs font-bold text-sky-400"><span className="bg-sky-50 px-2 py-0.5 rounded-lg">{t.baseWidth}×{t.baseHeight}cm</span><span>縫份 {t.seamAllowance}cm</span></div></div>
                                        <div className="flex gap-2">
                                            <button onClick={() => { setCurrentTemplate(t); setScaleInput({addW:0,addH:0}); setActiveTab('calculate'); }} className="p-3 text-sky-400 bg-sky-50 rounded-2xl hover:bg-sky-400 hover:text-white transition-all"><Icon name="calculator" size={20} /></button>
                                            <button onClick={() => { setCurrentTemplate(t); setActiveTab('edit'); }} className="p-3 text-slate-300 bg-slate-50 rounded-2xl hover:bg-slate-200 transition-all"><Icon name="edit-3" size={20} /></button>
                                            <button onClick={() => handleDelete(t.id)} className="p-3 text-rose-200 bg-rose-50 rounded-2xl hover:bg-rose-500 hover:text-white transition-all"><Icon name="trash-2" size={20} /></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'edit' && currentTemplate && (
                            <div className="space-y-6">
                                <div className="bubble-card p-8 border-white shadow-sm">
                                    <h2 className="text-xl font-black mb-6 flex items-center gap-2"><Icon name="settings-2" className="text-sky-400"/> 基本設定</h2>
                                    <div className="space-y-4">
                                        <div className="bg-sky-50/30 p-5 rounded-[2rem] border border-sky-100"><label className="text-[10px] font-black text-sky-400 uppercase tracking-widest ml-2 block mb-2">作品名稱</label><input type="text" value={currentTemplate.name} onChange={e => setCurrentTemplate({...currentTemplate, name: e.target.value})} className="w-full bg-transparent font-black text-xl outline-none" placeholder="作品名稱" /></div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="bg-sky-50/30 p-5 rounded-[2rem] border border-sky-100"><label className="text-[10px] font-black text-sky-400 ml-2 block mb-2 uppercase tracking-widest">基準 (W×H)</label><div className="flex gap-2"><input type="number" value={currentTemplate.baseWidth} onChange={e => setCurrentTemplate({...currentTemplate, baseWidth: e.target.value})} className="w-full bg-transparent font-black text-center outline-none" /><input type="number" value={currentTemplate.baseHeight} onChange={e => setCurrentTemplate({...currentTemplate, baseHeight: e.target.value})} className="w-full bg-transparent font-black text-center outline-none" /></div></div>
                                            <div className="bg-cyan-50/50 p-5 rounded-[2rem] border border-cyan-100"><label className="text-[10px] font-black text-cyan-500 ml-2 block mb-2 uppercase tracking-widest">預設縫份 (cm)</label><input type="number" step="0.1" value={currentTemplate.seamAllowance} onChange={e => setCurrentTemplate({...currentTemplate, seamAllowance: e.target.value})} className="w-full bg-transparent font-black text-center outline-none text-cyan-600" /></div>
                                        </div>
                                    </div>
                                </div>
                                <div className="space-y-4">
                                    <div className="flex justify-between items-center px-4"><h2 className="text-xl font-black flex items-center gap-2 text-black"><Icon name="ruler" className="text-sky-400"/> 零件配置</h2><button onClick={() => setCurrentTemplate({...currentTemplate, components: [...currentTemplate.components, { id: Date.now(), name: '新零件', baseW: 10, baseH: 10, type: 'both', quantity: 1, includeSA: true }]})} className="bg-sky-400 text-white px-5 py-2 rounded-2xl font-black text-sm shadow-md active:scale-95">+ 增加零件</button></div>
                                    {currentTemplate.components.map((comp, idx) => (
                                        <div key={comp.id} className="bubble-card p-6 border-white space-y-4 shadow-sm">
                                            <div className="flex justify-between items-center"><input type="text" value={comp.name} onChange={e => { const nc = [...currentTemplate.components]; nc[idx].name = e.target.value; setCurrentTemplate({...currentTemplate, components: nc}); }} className="font-black text-xl bg-transparent border-b-2 border-transparent focus:border-sky-100 outline-none w-full mr-4" /><div onClick={() => { const nc = [...currentTemplate.components]; nc[idx].includeSA = !nc[idx].includeSA; setCurrentTemplate({...currentTemplate, components: nc}); }} className={`w-10 h-5 rounded-full relative transition-all ${comp.includeSA ? 'bg-sky-400':'bg-slate-200'}`}><div className={`absolute top-1 w-3 h-3 bg-white rounded-full transition-all ${comp.includeSA ? 'left-6':'left-1'}`} /></div></div>
                                            <div className="grid grid-cols-4 gap-2">
                                                {['baseW', 'baseH', 'quantity'].map((k, i) => <div key={k} className="text-center"><label className="text-[8px] font-black text-black/20 block mb-1">{['寬','高','量'][i]}</label><input type="number" value={comp[k]} onChange={e => { const nc = [...currentTemplate.components]; nc[idx][k] = e.target.value; setCurrentTemplate({...currentTemplate, components: nc}); }} className="w-full bg-sky-50/50 p-2 rounded-xl text-center font-black outline-none" /></div>)}
                                                <div className="text-center"><label className="text-[8px] font-black text-black/20 block mb-1">規則</label><select value={comp.type} onChange={e => { const nc = [...currentTemplate.components]; nc[idx].type = e.target.value; setCurrentTemplate({...currentTemplate, components: nc}); }} className="w-full bg-sky-50/50 p-2 rounded-xl font-black text-[9px] outline-none text-center"><option value="both">全縮放</option><option value="width">僅寬</option><option value="height">僅高</option><option value="fixed">固定</option></select></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="flex gap-4 pt-6 px-2"><button onClick={() => handleSave(currentTemplate)} className="flex-1 bg-sky-400 text-white font-black py-5 rounded-[2.5rem] shadow-xl active:scale-95 transition-all">同步雲端儲存</button><button onClick={() => setActiveTab('list')} className="px-10 bg-slate-50 text-slate-300 font-black py-5 rounded-[2.5rem]">取消</button></div>
                            </div>
                        )}

                        {activeTab ===
