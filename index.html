<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>裁縫小助手 - Sewing Scaler</title>
    
    <!-- 圖示與風格設定 -->
    <link rel="icon" type="image/jpeg" href="icon.jpg?v=12">
    <link rel="apple-touch-icon" type="image/jpeg" href="icon.jpg?v=12">    
    
    <!-- 資源載入 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        :root {
            --sea-salt-bg: #f7fdff; /* 極淺海鹽藍背景 */
            --bubble-blue: #e0f2fe; /* 氣泡點綴藍 */
            --accent-sky: #38bdf8;  /* 主色海鹽藍 */
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--sea-salt-bg);
            color: #000000; /* 純黑字體提升易讀性 */
            margin: 0;
            -webkit-tap-highlight-color: transparent;
        }

        /* 氣泡感卡片設計 */
        .bubble-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 10px 40px rgba(186, 230, 253, 0.2);
            border-radius: 2.5rem;
        }

        /* 磨砂玻璃導航列 */
        .nav-glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(224, 242, 254, 0.5);
            box-shadow: 0 -10px 30px rgba(224, 242, 254, 0.4);
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .page-transition {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .google-btn {
            background: white;
            border: 1px solid #e0f2fe;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .google-btn:hover {
            background: #f0f9ff;
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(186, 230, 253, 0.4);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDK 模組 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, GoogleAuthProvider, signInWithPopup, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 使用您提供的 Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyA5X-pLPJ8zXfn6uki6tqiOdf55YXu1-ZI",
            authDomain: "tailor-v1.firebaseapp.com",
            projectId: "tailor-v1",
            storageBucket: "tailor-v1.firebasestorage.app",
            messagingSenderId: "440121443722",
            appId: "1:440121443722:web:da11877f99b9601b37b473",
            measurementId: "G-02DVJL2V5S"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 橋接到全域讓 React 調用 - 修正：新增遺漏的函式
        window.tailorFB = { 
            auth, db, GoogleAuthProvider, signInWithPopup, 
            signInWithEmailAndPassword, createUserWithEmailAndPassword, 
            signOut, collection, doc, setDoc, deleteDoc, onSnapshot, query, orderBy,
            onAuthStateChanged, signInWithCustomToken
        };
        window.dispatchEvent(new Event('fb-ready'));
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 🌟 強化版 Icon 組件 🌟
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons({
                        root: iconRef.current
                    });
                }
            }, [name, size, className]);

            return (
                <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`}>
                    <i data-lucide={name} style={{ width: size, height: size }}></i>
                </span>
            );
        };

        const COMPONENT_TYPES = [
            { id: 'both', label: '全縮放' },
            { id: 'width', label: '僅寬度' },
            { id: 'height', label: '僅高度' },
            { id: 'fixed', label: '固定' },
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('list');
            const [templates, setTemplates] = useState([]);
            const [currentTemplate, setCurrentTemplate] = useState(null);
            const [scaleInput, setScaleInput] = useState({ addW: 0, addH: 0 });
            const [copyFeedback, setCopyFeedback] = useState(null);

            // 初始化 Firebase 監聽
            useEffect(() => {
                const init = () => {
                    if (window.tailorFB && window.tailorFB.onAuthStateChanged) {
                        window.tailorFB.onAuthStateChanged(window.tailorFB.auth, (u) => {
                            setUser(u);
                            setLoading(false);
                        });
                    }
                };
                if (window.tailorFB) init();
                else window.addEventListener('fb-ready', init);
            }, []);

            // 實時資料同步 (雲端資料庫)
            useEffect(() => {
                if (user && window.tailorFB) {
                    const templatesRef = window.tailorFB.collection(window.tailorFB.db, 'users', user.uid, 'templates');
                    const unsubscribe = window.tailorFB.onSnapshot(templatesRef, (snapshot) => {
                        const data = snapshot.docs.map(doc => ({ ...doc.data(), id: doc.id }));
                        setTemplates(data);
                    });
                    return () => unsubscribe();
                }
            }, [user]);

            const handleSave = async (data) => {
                if (!user) return;
                const templateId = data.id || Date.now().toString();
                const docRef = window.tailorFB.doc(window.tailorFB.db, 'users', user.uid, 'templates', templateId);
                await window.tailorFB.setDoc(docRef, { ...data, id: templateId, updatedAt: Date.now() });
                setActiveTab('list');
            };

            const handleDelete = async (id) => {
                if (!confirm("確定要刪除這個模板嗎？")) return;
                const docRef = window.tailorFB.doc(window.tailorFB.db, 'users', user.uid, 'templates', id);
                await window.tailorFB.deleteDoc(docRef);
            };

            const calculate = (comp, addW, addH, sa) => {
                let w = parseFloat(comp.baseW) || 0;
                let h = parseFloat(comp.baseH) || 0;
                const offset = comp.includeSA ? parseFloat(sa) || 0 : 0;
                if (comp.type === 'both') { w += parseFloat(addW) || 0; h += parseFloat(addH) || 0; }
                else if (comp.type === 'width') { w += parseFloat(addW) || 0; }
                else if (comp.type === 'height') { h += parseFloat(addH) || 0; }
                return { w: (w + 2 * offset).toFixed(1), h: (h + 2 * offset).toFixed(1) };
            };

            const copyLink = (url, id) => {
                const el = document.createElement('textarea');
                el.value = url;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopyFeedback(id);
                setTimeout(() => setCopyFeedback(null), 2000);
            };

            const AuthScreen = () => {
                const [email, setEmail] = useState('');
                const [password, setPassword] = useState('');
                const [isSignUp, setIsSignUp] = useState(false);
                const [error, setError] = useState('');

                const handleGoogleLogin = async () => {
                    const provider = new window.tailorFB.GoogleAuthProvider();
                    try {
                        await window.tailorFB.signInWithPopup(window.tailorFB.auth, provider);
                    } catch (e) { setError("Google 登入失敗，請確認 Firebase 已授權此網域。"); }
                };

                const handleEmailLogin = async (e) => {
                    e.preventDefault();
                    try {
                        if (isSignUp) await window.tailorFB.createUserWithEmailAndPassword(window.tailorFB.auth, email, password);
                        else await window.tailorFB.signInWithEmailAndPassword(window.tailorFB.auth, email, password);
                    } catch (e) { setError("帳號或密碼錯誤。"); }
                };

                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-white">
                        <div className="bubble-card p-10 w-full max-w-md text-center shadow-2xl">
                            <div className="bg-sky-400 w-20 h-20 rounded-[2.2rem] flex items-center justify-center text-white mx-auto mb-6 shadow-xl shadow-sky-100">
                                <Icon name="scissors" size={40} />
                            </div>
                            <h2 className="text-3xl font-black text-black mb-2">裁縫小助手</h2>
                            <p className="text-slate-400 font-bold mb-8">個人化雲端模板管理系統</p>
                            
                            <form onSubmit={handleEmailLogin} className="space-y-4">
                                <input type="email" placeholder="信箱" value={email} onChange={e => setEmail(e.target.value)} className="w-full bg-sky-50/50 p-4 rounded-2xl outline-none font-black text-black border-2 border-transparent focus:border-sky-200" required />
                                <input type="password" placeholder="密碼" value={password} onChange={e => setPassword(e.target.value)} className="w-full bg-sky-50/50 p-4 rounded-2xl outline-none font-black text-black border-2 border-transparent focus:border-sky-200" required />
                                {error && <p className="text-rose-500 text-xs font-black px-2">{error}</p>}
                                <button type="submit" className="w-full bg-sky-400 text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 transition-all">{isSignUp ? '立即註冊' : '登入系統'}</button>
                            </form>

                            <div className="relative my-8"><div className="absolute inset-0 flex items-center"><div className="w-full border-t border-sky-100"></div></div><div className="relative flex justify-center text-xs uppercase"><span className="bg-white px-4 text-slate-300 font-black">或者</span></div></div>
                            
                            <button onClick={handleGoogleLogin} className="w-full google-btn text-black font-black py-4 rounded-2xl flex items-center justify-center gap-3 active:scale-95 shadow-sm">
                                <svg className="w-5 h-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                                使用 Google 帳號登入
                            </button>
                            <button onClick={() => setIsSignUp(!isSignUp)} className="w-full mt-6 text-sm font-bold text-sky-400 underline">{isSignUp ? '已有帳號？返回登入' : '還沒有帳號？點此註冊'}</button>
                        </div>
                    </div>
                );
            };

            if (loading) return <div className="min-h-screen flex flex-col items-center justify-center bg-white"><div className="w-12 h-12 border-4 border-sky-100 border-t-sky-400 rounded-full animate-spin mb-4"></div><p className="text-sky-300 font-black animate-pulse">海鹽藍工作台準備中...</p></div>;
            if (!user) return <AuthScreen />;

            return (
                <div className="max-w-2xl mx-auto min-h-screen relative px-4 pt-4 pb-32">
                    <header className="flex justify-between items-center mb-8 px-2">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={() => setActiveTab('list')}>
                            <div className="bg-sky-400 p-2.5 rounded-[1.2rem] text-white shadow-lg"><Icon name="scissors" size={24} /></div>
                            <h1 className="text-2xl font-black italic text-black tracking-tight">裁縫小助手</h1>
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={() => window.tailorFB.signOut(window.tailorFB.auth)} className="p-2.5 text-slate-300 hover:text-rose-500 bg-white rounded-xl border border-sky-50 shadow-sm transition-all"><Icon name="log-out" size={20} /></button>
                            {activeTab === 'list' && <button onClick={() => { setCurrentTemplate({ name: '我的新作品', baseWidth: 14, baseHeight: 11.5, seamAllowance: 1.0, components: [{ id: Date.now(), name: '表布', baseW: 14, baseH: 11.5, type: 'both', quantity: 2, includeSA: true }], links: [] }); setActiveTab('edit'); }} className="bg-sky-400 text-white px-6 py-2.5 rounded-full font-black shadow-md active:scale-95 transition-all">新增作品</button>}
                        </div>
                    </header>

                    <div className="page-transition">
                        {activeTab === 'list' && (
                            <div className="grid gap-5">
                                {templates.length === 0 ? (
                                    <div className="text-center py-20 bubble-card border-dashed border-2 border-sky-100 shadow-none bg-transparent">
                                        <Icon name="sparkles" size={48} className="mx-auto text-sky-100 mb-4" />
                                        <p className="text-sky-300 font-bold">歡迎回來！開始記錄您的創意模板吧</p>
                                    </div>
                                ) : (
                                    templates.map(t => (
                                        <div key={t.id} className="bubble-card p-6 flex justify-between items-center border-white shadow-sm hover:border-sky-200 transition-all">
                                            <div className="flex-1 mr-4 overflow-hidden">
                                                <h3 className="text-xl font-black mb-1 truncate text-black">{t.name}</h3>
                                                <div className="flex gap-3 text-sm font-bold">
                                                    <span className="bg-sky-50 text-sky-600 px-2 py-0.5 rounded-lg">{t.baseWidth}×{t.baseHeight}cm</span>
                                                    <span className="text-cyan-500 font-black">縫份 {t.seamAllowance}cm</span>
                                                </div>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => { setCurrentTemplate(t); setScaleInput({addW:0,addH:0}); setActiveTab('calculate'); }} className="p-3 text-sky-400 bg-sky-50 rounded-2xl hover:bg-sky-400 hover:text-white transition-all shadow-sm"><Icon name="calculator" size={20} /></button>
                                                <button onClick={() => { setCurrentTemplate(t); setActiveTab('edit'); }} className="p-3 text-slate-400 bg-slate-50 rounded-2xl hover:bg-slate-200 hover:text-black transition-all shadow-sm"><Icon name="settings-2" size={20} /></button>
                                                <button onClick={() => handleDelete(t.id)} className="p-3 text-rose-300 bg-rose-50 rounded-2xl hover:bg-rose-500 hover:text-white transition-all shadow-sm"><Icon name="trash-2" size={20} /></button>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}

                        {activeTab === 'edit' && currentTemplate && (
                            <div className="space-y-6">
                                <div className="bubble-card p-8 border-white shadow-sm">
                                    <h2 className="text-xl font-black mb-6 flex items-center gap-2 text-black"><Icon name="settings-2" className="text-sky-400"/> 基本設定</h2>
                                    <div className="space-y-6">
                                        <div><label className="text-xs font-black text-black/30 block mb-2 tracking-widest uppercase">作品名稱</label><input type="text" value={currentTemplate.name} onChange={e => setCurrentTemplate({...currentTemplate, name: e.target.value})} className="w-full bg-sky-50/50 border-2 border-transparent focus:border-sky-100 rounded-2xl p-4 font-black outline-none transition-all text-black" /></div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div><label className="text-xs font-black text-black/30 mb-2 block tracking-widest uppercase">基準寬×高 (cm)</label><div className="flex items-center gap-2"><input type="number" value={currentTemplate.baseWidth} onChange={e => setCurrentTemplate({...currentTemplate, baseWidth: e.target.value})} className="w-full bg-sky-50/30 rounded-2xl p-4 text-center font-black outline-none text-black" /><input type="number" value={currentTemplate.baseHeight} onChange={e => setCurrentTemplate({...currentTemplate, baseHeight: e.target.value})} className="w-full bg-sky-50/30 rounded-2xl p-4 text-center font-black outline-none text-black" /></div></div>
                                            <div><label className="text-xs font-black text-black/30 mb-2 block tracking-widest uppercase">預設縫份 (cm)</label><input type="number" step="0.1" value={currentTemplate.seamAllowance} onChange={e => setCurrentTemplate({...currentTemplate, seamAllowance: e.target.value})} className="w-full bg-cyan-50 border-2 border-cyan-100 rounded-2xl p-4 text-center font-black text-cyan-600 outline-none" /></div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bubble-card p-8 border-white shadow-sm">
                                    <div className="flex justify-between items-center mb-6"><h2 className="text-xl font-black flex items-center gap-2 text-black"><Icon name="link" className="text-sky-400"/> 教學與參考連結</h2><button onClick={() => setCurrentTemplate({...currentTemplate, links: [...(currentTemplate.links || []), {id: Date.now(), title:'', url:''}]})} className="text-xs font-black text-sky-500 bg-sky-50 px-3 py-1.5 rounded-xl hover:bg-sky-100 transition-colors">+ 新增連結</button></div>
                                    <div className="space-y-4">{(currentTemplate.links || []).map((link, idx) => (<div key={link.id} className="flex gap-3 p-4 bg-sky-50/20 rounded-[1.5rem] items-center"><div className="flex-1 space-y-2"><input type="text" placeholder="教學標題" value={link.title} onChange={e => { const nl = [...currentTemplate.links]; nl[idx].title = e.target.value; setCurrentTemplate({...currentTemplate, links: nl}); }} className="w-full bg-white p-2 rounded-lg text-sm font-black outline-none text-black" /><input type="text" placeholder="URL" value={link.url} onChange={e => { const nl = [...currentTemplate.links]; nl[idx].url = e.target.value; setCurrentTemplate({...currentTemplate, links: nl}); }} className="w-full bg-white/50 p-2 rounded-lg text-xs font-medium outline-none text-black/60" /></div><button onClick={() => setCurrentTemplate({...currentTemplate, links: currentTemplate.links.filter((_, i) => i !== idx)})} className="text-rose-300 hover:text-rose-500 transition-colors"><Icon name="trash-2" size={20} /></button></div>))}</div>
                                </div>

                                <div className="space-y-4 pb-12">
                                    <div className="flex justify-between items-center px-4"><h2 className="text-xl font-black flex items-center gap-2 text-black"><Icon name="ruler" className="text-sky-400"/> 零件清單配置</h2><button onClick={() => setCurrentTemplate({...currentTemplate, components: [...currentTemplate.components, { id: Date.now(), name: '新零件', baseW: 10, baseH: 10, type: 'both', quantity: 1, includeSA: true }]})} className="bg-sky-400 text-white px-5 py-2 rounded-2xl font-black text-sm shadow-md active:scale-95 transition-all">+ 新增零件</button></div>
                                    {currentTemplate.components.map((comp, idx) => (
                                        <div key={comp.id} className="bubble-card p-6 border-white space-y-4 shadow-sm">
                                            <div className="flex justify-between items-center"><input type="text" value={comp.name} onChange={e => { const nc = [...currentTemplate.components]; nc[idx].name = e.target.value; setCurrentTemplate({...currentTemplate, components: nc}); }} className="font-black text-xl bg-transparent border-b-2 border-transparent focus:border-sky-100 outline-none w-full mr-4 text-black" /><label className="flex items-center gap-2 cursor-pointer shrink-0"><span className={`text-[10px] font-black uppercase ${comp.includeSA ? 'text-black':'text-slate-300'}`}>計算縫份</span><div onClick={() => { const nc = [...currentTemplate.components]; nc[idx].includeSA = !nc[idx].includeSA; setCurrentTemplate({...currentTemplate, components: nc}); }} className={`w-10 h-5 rounded-full relative transition-all ${comp.includeSA ? 'bg-sky-400':'bg-slate-200'}`}><div className={`absolute top-1 w-3 h-3 bg-white rounded-full shadow-sm transition-all ${comp.includeSA ? 'left-6':'left-1'}`} /></div></label><button onClick={() => setCurrentTemplate({...currentTemplate, components: currentTemplate.components.filter((_, i) => i !== idx)})} className="text-slate-200 hover:text-rose-500 transition-all"><Icon name="trash-2" size={18}/></button></div>
                                            <div className="grid grid-cols-4 gap-3">
                                                {[{k:'baseW',l:'寬'},{k:'baseH',l:'高'},{k:'quantity',l:'數量'}].map(f => (<div key={f.k} className="text-center"><label className="text-[9px] font-black text-black/20 block mb-1">{f.l}</label><input type="number" value={comp[f.k]} onChange={e => { const nc = [...currentTemplate.components]; nc[idx][f.k] = e.target.value; setCurrentTemplate({...currentTemplate, components: nc}); }} className="w-full bg-sky-50/50 p-2 rounded-xl text-center font-black outline-none text-black" /></div>))}
                                                <div className="text-center"><label className="text-[9px] font-black text-black/20 block mb-1">規則</label><select value={comp.type} onChange={e => { const nc = [...currentTemplate.components]; nc[idx].type = e.target.value; setCurrentTemplate({...currentTemplate, components: nc}); }} className="w-full bg-sky-50/50 p-2 rounded-xl font-black text-[10px] outline-none appearance-none text-center text-black tracking-tighter">{COMPONENT_TYPES.map(o => <option key={o.id} value={o.id}>{o.label}</option>)}</select></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="flex gap-4 pt-6 pb-20 px-2"><button onClick={() => handleSave(currentTemplate)} className="flex-1 bg-sky-400 text-white font-black py-5 rounded-[2rem] shadow-xl active:scale-95 transition-all">儲存至雲端</button><button onClick={() => setActiveTab('list')} className="px-10 bg-slate-100 text-slate-500 font-black py-5 rounded-[2rem] hover:bg-slate-200 transition-colors">取消</button></div>
                            </div>
                        )}

                        {activeTab === 'calculate' && currentTemplate && (
                            <div className="space-y-8 animate-in fade-in pb-20">
                                <div className="bg-gradient-to-br from-sky-300 via-sky-400 to-cyan-400 text-white p-10 rounded-[3rem] shadow-2xl relative overflow-hidden"><div className="absolute -right-10 -top-10 w-48 h-48 bg-white/10 rounded-full blur-2xl"></div><h2 className="text-3xl font-black mb-8 relative z-10">{currentTemplate.name}</h2><div className="grid grid-cols-2 gap-8 relative z-10"><div className="space-y-3"><label className="text-[10px] font-black opacity-80 uppercase tracking-widest ml-4">寬度增加 (W)</label><input type="number" value={scaleInput.addW} onChange={e => setScaleInput({...scaleInput, addW: e.target.value})} className="w-full bg-white/20 backdrop-blur-md border-2 border-white/30 rounded-[2rem] p-6 text-white font-black text-4xl outline-none" /></div><div className="space-y-3"><label className="text-[10px] font-black opacity-80 uppercase tracking-widest ml-4">高度增加 (H)</label><input type="number" value={scaleInput.addH} onChange={e => setScaleInput({...scaleInput, addH: e.target.value})} className="w-full bg-white/20 backdrop-blur-md border-2 border-white/30 rounded-[2rem] p-6 text-white font-black text-4xl outline-none" /></div></div></div>
                                {currentTemplate.links?.length > 0 && (<div className="space-y-3"><h3 className="font-black flex items-center gap-2 px-4 text-lg text-black"><Icon name="book-open" className="text-sky-400"/> 教學與參考連結</h3><div className="grid gap-2">{currentTemplate.links.map(l => (<div key={l.id} className="bubble-card p-5 flex items-center justify-between border-white shadow-sm"><div className="flex-1 overflow-hidden mr-4"><h4 className="font-black text-sm truncate text-black">{l.title || '教學連結'}</h4><p className="text-[10px] text-sky-400 font-bold truncate">{l.url}</p></div><button onClick={() => copyLink(l.url, l.id)} className={`flex items-center gap-2 px-5 py-2.5 rounded-2xl text-[10px] font-black transition-all ${copyFeedback === l.id ? 'bg-emerald-500 text-white shadow-lg':'bg-sky-50 text-black border border-sky-100 hover:bg-sky-100'}`}>{copyFeedback === l.id ? '已複製' : '複製網址'}</button></div>))}</div></div>)}
                                <div className="space-y-4"><h3 className="font-black flex items-center gap-2 px-4 text-lg text-black"><Icon name="scissors" className="text-sky-400"/> 最終裁切清單 (含縫份)</h3>{currentTemplate.components.map(comp => { const res = calculate(comp, scaleInput.addW, scaleInput.addH, currentTemplate.seamAllowance); return (<div key={comp.id} className="bubble-card p-6 flex items-center gap-6 border-white shadow-sm"><div className="w-16 h-16 rounded-[1.5rem] bg-sky-400 text-white flex flex-col items-center justify-center font-black shadow-lg"><span className="text-[9px] opacity-70">數量</span><span className="text-2xl leading-none">{comp.quantity}</span></div><div className="flex-1"><div className="flex justify-between items-center mb-1"><span className="font-black text-lg text-black">{comp.name}</span><span className={`text-[8px] font-black uppercase px-2 py-0.5 rounded-full ${comp.includeSA ? 'bg-cyan-400 text-white shadow-sm':'bg-slate-100 text-slate-400'}`}>{comp.includeSA ? '含縫份':'淨尺寸'}</span></div><div className="flex items-baseline gap-1"><span className="text-4xl font-black text-black">{res.w} <span className="text-xl font-normal text-sky-200">×</span> {res.h}</span><span className="text-xs font-black text-sky-200 uppercase ml-1">cm</span></div></div></div>);})}</div>
                                <button onClick={() => setActiveTab('list')} className="w-full py-5 text-sky-300 font-black bg-white/60 border-2 border-white rounded-[2rem] shadow-sm active:scale-95 transition-all mb-4">返回列表</button>
                            </div>
                        )}
                    </div>

                    <nav className="fixed bottom-6 left-6 right-6 max-w-2xl mx-auto z-40 p-3 rounded-[2.5rem] nav-glass flex justify-around items-center shadow-xl">
                        <button onClick={() => setActiveTab('list')} className={`flex flex-col items-center py-2 px-8 rounded-2xl transition-all duration-300 ${activeTab === 'list' ? 'text-black bg-sky-50 font-black shadow-inner scale-105' : 'text-slate-300 font-bold hover:text-sky-400'}`}><Icon name="home" size={22} className="mb-1" /><span className="text-[10px]">我的作品</span></button>
                        <button onClick={() => { setCurrentTemplate({ name: '新作品', baseWidth: 14, baseHeight: 11.5, seamAllowance: 1.0, components: [{ id: Date.now(), name: '表布', baseW: 14, baseH: 11.5, type: 'both', quantity: 2, includeSA: true }], links: [] }); setActiveTab('edit'); }} className={`flex flex-col items-center py-2 px-8 rounded-2xl transition-all duration-300 ${activeTab === 'edit' ? 'text-black bg-sky-50 font-black shadow-inner scale-105' : 'text-slate-300 font-bold hover:text-sky-400'}`}><Icon name="plus" size={22} className="mb-1" /><span className="text-[10px]">建立模板</span></button>
                        <button onClick={() => { if(currentTemplate) setActiveTab('calculate'); }} className={`flex flex-col items-center py-2 px-8 rounded-2xl transition-all duration-300 ${activeTab === 'calculate' ? 'text-black bg-sky-50 font-black shadow-inner scale-105' : 'text-slate-300 font-bold hover:text-sky-400'} ${!currentTemplate ? 'opacity-20 pointer-events-none':''}`}><Icon name="calculator" size={22} className="mb-1" /><span className="text-[10px]">尺寸計算</span></button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
